name: ETL Validation Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-validate:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Test Script
      run: |
        python test_pipeline.py